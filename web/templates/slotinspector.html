<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klever Node Hub - Slot Inspector</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/img/icon-192.png">
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">
</head>
<body>
    <div class="overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="app">
        <!--#sidebar-->

        <main class="main-content">
            <div class="topbar">
                <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
                <h1>Slot Inspector</h1>
                <div style="width:36px"></div>
            </div>

            <div class="page-header">
                <div class="page-header-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <span class="page-header-title">Slot Inspector</span>
                    <span class="page-header-sub">Fetch slot-specific logs across all nodes</span>
                </div>
            </div>

            <div class="page-body">
                <div class="card mb-16">
                    <div class="card-header"><h3>1. Slot number(s)</h3></div>
                    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;">
                        <div style="flex:1;min-width:240px;">
                            <label class="form-label">Slot number(s) — comma-separated for multiple</label>
                            <input type="text" id="slot-input" class="form-input" placeholder="e.g. 30500707 or 30500707,30500708,30500715">
                        </div>
                        <div>
                            <label class="form-label">Context lines</label>
                            <input type="number" id="context-lines" class="form-input" value="30" min="0" max="200" style="width:100px;">
                        </div>
                        <div>
                            <label class="form-label">Log lines to scan</label>
                            <input type="number" id="tail-lines" class="form-input" value="10000" min="100" max="100000" step="1000" style="width:130px;" title="How far back to scan in container logs (max 100000)">
                        </div>
                    </div>
                </div>

                <div class="card mb-16">
                    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
                        <h3>2. Target nodes</h3>
                        <div style="display:flex;gap:8px;">
                            <button class="btn btn-sm btn-ghost" onclick="siSelectAll(true)">Select all</button>
                            <button class="btn btn-sm btn-ghost" onclick="siSelectAll(false)">None</button>
                        </div>
                    </div>
                    <div id="si-node-list" style="border:1px solid var(--border);border-radius:8px;max-height:400px;overflow-y:auto;">
                        <div class="text-sm text-muted" style="padding:16px;text-align:center;">Loading nodes...</div>
                    </div>
                </div>

                <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;">
                    <button class="btn btn-primary" onclick="inspectSlot()" id="si-run-btn">Inspect</button>
                    <span id="si-status" class="text-sm text-muted"></span>
                </div>

                <div id="si-results-toolbar" class="hidden" style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;margin-bottom:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;">
                    <span class="text-sm" style="color:var(--text-secondary);">
                        <strong id="si-results-summary"></strong>
                    </span>
                    <button class="btn btn-primary" onclick="copyAllResults()" id="si-copy-btn">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        Copy all results
                    </button>
                </div>

                <div id="si-results"></div>
            </div>
        </main>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/agent-update-check.js"></script>
    <script>
    (async function() {
        await API.refresh();
        loadNodes();
    })();

    var allNodes = [];
    var lastResults = [];

    function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
    }

    async function loadNodes() {
        try {
            var data = await API.getJSON('/api/nodes');
            allNodes = (data && data.nodes) || [];
            renderNodeList();
        } catch (e) {
            document.getElementById('si-node-list').innerHTML =
                '<div class="text-sm text-muted" style="padding:16px;text-align:center;color:var(--error);">Failed to load nodes.</div>';
        }
    }

    function renderNodeList() {
        var list = document.getElementById('si-node-list');
        if (allNodes.length === 0) {
            list.innerHTML = '<div class="text-sm text-muted" style="padding:16px;text-align:center;">No nodes available.</div>';
            return;
        }
        var html = allNodes.map(function(n) {
            var isMaster = (n.redundancy_level || 0) === 0;
            var roleColor = isMaster ? '#22c55e' : '#f59e0b';
            var roleLabel = isMaster ? 'Master' : 'Fallback';
            return '<label class="si-node-row" style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer;">' +
                '<input type="checkbox" class="si-node-cb" data-node-id="' + esc(n.id) + '" checked style="width:16px;height:16px;cursor:pointer;">' +
                '<span style="flex:1;color:var(--text-primary);font-size:13px;">' + esc(n.display_name || n.container_name) + '</span>' +
                '<span style="padding:2px 8px;border-radius:4px;background:' + roleColor + '20;color:' + roleColor + ';font-size:11px;font-weight:700;">' + roleLabel + '</span>' +
                '<span class="text-sm text-muted" style="min-width:60px;text-align:right;">' + esc(n.status) + '</span>' +
                '</label>';
        }).join('');
        list.innerHTML = html;
    }

    function siSelectAll(state) {
        document.querySelectorAll('.si-node-cb').forEach(function(cb) { cb.checked = state; });
    }

    async function inspectSlot() {
        var slotsRaw = document.getElementById('slot-input').value.trim();
        if (!slotsRaw) {
            alert('Please enter at least one slot number.');
            return;
        }
        var slots = slotsRaw.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
        var contextLines = parseInt(document.getElementById('context-lines').value, 10) || 30;
        var tailLines = parseInt(document.getElementById('tail-lines').value, 10) || 10000;
        var nodeIDs = [];
        document.querySelectorAll('.si-node-cb:checked').forEach(function(cb) {
            nodeIDs.push(cb.getAttribute('data-node-id'));
        });
        if (nodeIDs.length === 0) {
            alert('No nodes selected.');
            return;
        }

        var btn = document.getElementById('si-run-btn');
        btn.disabled = true;
        btn.textContent = 'Inspecting...';
        document.getElementById('si-status').textContent = 'Fetching logs from ' + nodeIDs.length + ' nodes...';
        document.getElementById('si-results').innerHTML = '';
        document.getElementById('si-results-toolbar').classList.add('hidden');

        try {
            var resp = await fetch('/api/slot-inspect', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': API.accessToken ? 'Bearer ' + API.accessToken : ''
                },
                body: JSON.stringify({
                    slots: slots,
                    context: contextLines,
                    tail: tailLines,
                    node_ids: nodeIDs
                })
            });
            var data = await resp.json();
            lastResults = data.results || [];
            renderResults();
            document.getElementById('si-status').textContent = 'Done. ' + lastResults.length + ' nodes processed.';
            var withMatches = lastResults.filter(function(r) { return r.lines && r.lines.length > 0; }).length;
            document.getElementById('si-results-summary').textContent =
                lastResults.length + ' nodes scanned · ' + withMatches + ' with matches';
            document.getElementById('si-results-toolbar').classList.remove('hidden');
        } catch (e) {
            document.getElementById('si-status').innerHTML =
                '<span style="color:var(--error);">Failed: ' + esc(e.message || e) + '</span>';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Inspect';
        }
    }

    function renderResults() {
        var html = lastResults.map(function(r) {
            var nodeName = esc(r.node_name || r.node_id);
            var icon = r.error ? '&#10007;' : '&#10003;';
            var color = r.error ? '#ef4444' : '#22c55e';
            var body = '';
            if (r.error) {
                body = '<div style="padding:12px;color:var(--error);font-size:12px;">' + esc(r.error) + '</div>';
            } else if (!r.lines || r.lines.length === 0) {
                body = '<div style="padding:12px;color:var(--text-muted);font-size:12px;">No matches in recent logs.</div>';
            } else {
                body = '<pre style="margin:0;padding:14px;background:#0a0e14;border-top:1px solid var(--border);font-family:\'JetBrains Mono\',monospace;font-size:11.5px;line-height:1.5;overflow-x:auto;white-space:pre;color:#c5cdd9;max-height:400px;overflow-y:auto;">' +
                    esc(r.lines.join('\n')) + '</pre>';
            }
            var timingTable = '';
            if (r.timings && r.timings.length > 0) {
                timingTable = '<div style="padding:10px 14px;background:var(--bg-input);border-top:1px solid var(--border);">' +
                    '<div class="text-sm text-muted" style="margin-bottom:6px;">Validator times (parsed)</div>' +
                    r.timings.map(function(t) {
                        return '<div style="display:flex;gap:12px;font-size:12px;color:var(--text-secondary);">' +
                            '<span>slot=' + esc(t.slot) + '</span>' +
                            '<span>' + esc(t.time_ms) + 'ms</span>' +
                            (t.lower_bound ? '<span class="text-muted">lower=' + esc(t.lower_bound) + 'ms</span>' : '') +
                            '</div>';
                    }).join('') +
                    '</div>';
            }
            return '<div class="card mb-16" style="overflow:hidden;">' +
                '<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg-tertiary);">' +
                    '<span style="color:' + color + ';font-weight:700;">' + icon + '</span>' +
                    '<strong style="flex:1;color:var(--text-primary);">' + nodeName + '</strong>' +
                    '<button class="btn btn-sm btn-ghost" onclick="copyResult(\'' + esc(r.node_id) + '\')">Copy</button>' +
                '</div>' +
                body +
                timingTable +
                '</div>';
        }).join('');
        document.getElementById('si-results').innerHTML = html;
    }

    function copyResult(nodeID) {
        var r = lastResults.find(function(x) { return x.node_id === nodeID; });
        if (!r) return;
        var text = '## ' + (r.node_name || r.node_id) + '\n```\n' + (r.lines || []).join('\n') + '\n```';
        navigator.clipboard.writeText(text);
    }

    function copyAllResults() {
        var text = lastResults.map(function(r) {
            var header = '## ' + (r.node_name || r.node_id);
            if (r.error) {
                return header + '\n_error: ' + r.error + '_';
            }
            if (!r.lines || r.lines.length === 0) {
                return header + '\n_no matches_';
            }
            return header + '\n```\n' + r.lines.join('\n') + '\n```';
        }).join('\n\n');
        navigator.clipboard.writeText(text).then(function() {
            var btn = document.getElementById('si-copy-btn');
            var orig = btn.innerHTML;
            btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><polyline points="20 6 9 17 4 12"/></svg>Copied!';
            setTimeout(function() { btn.innerHTML = orig; }, 2000);
        });
    }
    </script>
    <script>
    (function() {
        function updateSidebarAlertBadge(alerts) {
            var badge = document.getElementById('sidebar-alert-badge');
            if (!badge) return;
            var count = alerts ? alerts.length : 0;
            if (count === 0) {
                badge.classList.remove('visible', 'pulse');
                badge.textContent = '';
                return;
            }
            badge.textContent = count;
            badge.classList.add('visible');
            var hasCritical = alerts.some(function(a) { return a.severity === 'critical'; });
            if (hasCritical) { badge.classList.add('pulse'); } else { badge.classList.remove('pulse'); }
        }
        async function pollAlerts() {
            try {
                var data = await API.getJSON('/api/alerts');
                if (data && data.alerts) updateSidebarAlertBadge(data.alerts);
            } catch(e) {}
        }
        pollAlerts();
        setInterval(pollAlerts, 15000);
    })();

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('open');
    }
    </script>
</body>
</html>
